<!DOCTYPE html>
<html>
<head>
    <title>Verification Requests - ResortReviews</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        
        .admin-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            display: block;
        }
        
        .stat-label {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        
        .tab {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab:hover {
            background: var(--hover-bg);
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .request-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .request-id {
            font-weight: bold;
            color: var(--primary);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .request-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .detail-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
        }
        
        .detail-item strong {
            display: block;
            color: var(--text-light);
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .detail-item p {
            color: var(--text-dark);
            font-size: 14px;
        }
        
        .request-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-approve {
            background: #10b981;
            color: white;
        }
        
        .btn-reject {
            background: #ef4444;
            color: white;
        }
        
        .no-requests {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
            font-style: italic;
        }
        
        .back-link {
            margin-bottom: 20px;
        }
        
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .domain-warning {
            background: #fee2e2;
            border: 1px solid #ef4444;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            color: #991b1b;
            font-size: 13px;
        }

        .domain-success {
            background: #d1fae5;
            border: 1px solid #10b981;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            color: #065f46;
            font-size: 13px;
        }

        .resort-not-found {
            background: #fee2e2;
            border: 1px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            color: #991b1b;
            font-size: 14px;
            font-weight: 500;
        }

        .resort-found {
            background: #d1fae5;
            border: 1px solid #10b981;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            color: #065f46;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <a href="admin.html" class="home-btn" title="Admin Dashboard">
            <i class="fas fa-shield-alt"></i>
        </a>
    </div>
    <div class="nav-center">
        <a href="admin.html" class="logo">
            <i class="fas fa-umbrella-beach"></i>
            <span>ResortReviews Admin</span>
        </a>
    </div>
    <div class="nav-right">
        <div class="nav-icons">
            <a href="index.html" class="icon-btn" title="Home">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </div>
</div>

<div class="admin-container">
    <div class="back-link">
        <a href="admin.html"><i class="fas fa-arrow-left"></i> Back to Admin Dashboard</a>
    </div>
    
    <div class="admin-header">
        <div>
            <h1><i class="fas fa-check-circle"></i> Verification Requests</h1>
            <p>Review and verify resort applications</p>
        </div>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <span class="stat-value" id="pendingCount">0</span>
            <span class="stat-label">Pending</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="approvedCount">0</span>
            <span class="stat-label">Approved</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="rejectedCount">0</span>
            <span class="stat-label">Rejected</span>
        </div>
    </div>
    
    <div class="tab-nav">
        <button class="tab active" onclick="loadRequests('pending')" id="tabPending">Pending</button>
        <button class="tab" onclick="loadRequests('approved')" id="tabApproved">Approved</button>
        <button class="tab" onclick="loadRequests('rejected')" id="tabRejected">Rejected</button>
    </div>
    
    <div id="requestsList">
        <div class="loading-spinner">Loading requests...</div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://yaqtahzosvsrvbzurhgn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_syHNOYJ3kCbtLTwXI_wWiA_D-NYvwXl";
    
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentStatus = 'pending';
    
    window.addEventListener('load', async function() {
        await loadStats();
        await loadRequests('pending');
    });
    
    async function loadStats() {
        const { data: requests } = await supabaseClient
            .from('verification_requests')
            .select('status');
        
        if (!requests) return;
        
        const pending = requests.filter(r => r.status === 'pending').length;
        const approved = requests.filter(r => r.status === 'approved').length;
        const rejected = requests.filter(r => r.status === 'rejected').length;
        
        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('approvedCount').textContent = approved;
        document.getElementById('rejectedCount').textContent = rejected;
    }
    
    async function loadRequests(status) {
        currentStatus = status;
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
        });
        document.getElementById(`tab${status.charAt(0).toUpperCase() + status.slice(1)}`).classList.add('active');
        
        const { data: requests } = await supabaseClient
            .from('verification_requests')
            .select('*')
            .eq('status', status)
            .order('created_at', { ascending: false });
        
        displayRequests(requests || []);
    }
    
    function displayRequests(requests) {
        const container = document.getElementById('requestsList');
        
        if (requests.length === 0) {
            container.innerHTML = '<div class="no-requests">No verification requests found</div>';
            return;
        }
        
        let html = '';
        
        for (const request of requests) {
            const date = new Date(request.created_at).toLocaleDateString();
            
            html += `
                <div class="request-card">
                    <div class="request-header">
                        <div>
                            <span class="request-id">Request #${request.id}</span>
                            <span class="status-badge status-${request.status}">${request.status.toUpperCase()}</span>
                        </div>
                        <span>${date}</span>
                    </div>
                    
                    <div class="request-details">
                        <div class="detail-item">
                            <strong>Resort Name</strong>
                            <p>${request.resort_name}</p>
                        </div>
                        <div class="detail-item">
                            <strong>Contact Person</strong>
                            <p>${request.contact_person}</p>
                        </div>
                        <div class="detail-item">
                            <strong>Email</strong>
                            <p>${request.contact_email}</p>
                        </div>
                        <div class="detail-item">
                            <strong>Phone</strong>
                            <p>${request.phone || 'Not provided'}</p>
                        </div>
                        ${request.message ? `
                        <div class="detail-item" style="grid-column: span 2;">
                            <strong>Message</strong>
                            <p>${request.message}</p>
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="domain-check">
                        ${checkEmailDomain(request.contact_email)}
                    </div>
                    
                    ${request.status === 'pending' ? `
                        <div class="request-actions">
                            <button class="action-btn btn-approve" onclick="approveRequest(${request.id})">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="action-btn btn-reject" onclick="rejectRequest(${request.id})">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        container.innerHTML = html;
    }
    
    function checkEmailDomain(email) {
        const domain = email.split('@')[1];
        const FREE_EMAIL_DOMAINS = [
            'gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com',
            'aol.com', 'icloud.com', 'mail.com', 'protonmail.com',
            'yandex.com', 'gmx.com', 'live.com', 'msn.com'
        ];
        
        if (FREE_EMAIL_DOMAINS.includes(domain)) {
            return `<div class="domain-warning">
                <i class="fas fa-exclamation-triangle"></i> 
                Warning: Free email domain (${domain}). Real resorts usually use their own domain.
            </div>`;
        } else {
            return `<div class="domain-success">
                <i class="fas fa-check-circle"></i> 
                Professional email domain: ${domain}
            </div>`;
        }
    }
    
    async function sendEmailViaAPI(to, subject, html) {
        console.log('📧 Attempting to send email via API...');
        console.log('To:', to);
        
        try {
            const response = await fetch('/api/send-email', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    to: to,
                    subject: subject,
                    html: html
                })
            });
            
            const data = await response.json();
            console.log('✅ API Response:', data);
            
            if (!response.ok) {
                throw new Error(data.error || 'Failed to send email');
            }
            
            return data;
        } catch (error) {
            console.error('❌ Error sending email:', error);
            throw error;
        }
    }
    
    async function approveRequest(requestId) {
        console.log('✅ Approve button clicked for request:', requestId);
        
        try {
            const { data: request, error: fetchError } = await supabaseClient
                .from('verification_requests')
                .select('*')
                .eq('id', requestId)
                .single();
            
            if (fetchError) throw fetchError;
            
            console.log('📋 Request details:', request);
            
            // FIRST: Check if this resort exists in your database
            const { data: existingResort, error: resortError } = await supabaseClient
                .from('resorts')
                .select('*')
                .eq('name', request.resort_name)
                .maybeSingle();
            
            if (resortError) throw resortError;
            
            if (!existingResort) {
                alert(`❌ Resort "${request.resort_name}" does not exist in our database.\n\nPlease add it to the resorts table first.`);
                return;
            }
            
            console.log('🏨 Found existing resort:', existingResort);
            
            // Generate temporary password ONCE
            const tempPassword = Math.random().toString(36).slice(-8) + Math.random().toString(36).slice(-8).toUpperCase();
            console.log('🔐 Generated password for email and database:', tempPassword);
            
            // Update the EXISTING resort with verification details
            const { error: updateError } = await supabaseClient
                .from('resorts')
                .update({
                    verified: true,
                    login_email: request.contact_email,
                    temp_password: tempPassword,
                    phone: request.phone || existingResort.phone
                })
                .eq('id', existingResort.id);
            
            if (updateError) throw updateError;
            
            // Verify the password was saved correctly
            const { data: verifyResort } = await supabaseClient
                .from('resorts')
                .select('temp_password')
                .eq('id', existingResort.id)
                .single();
            
            console.log('🔍 Verification - Password in DB:', verifyResort?.temp_password);
            console.log('✅ Passwords match?', tempPassword === verifyResort?.temp_password);
            
            // Update request status
            const { error: statusError } = await supabaseClient
                .from('verification_requests')
                .update({ 
                    status: 'approved',
                    reviewed_at: new Date()
                })
                .eq('id', requestId);
            
            if (statusError) throw statusError;
            
            // Create email HTML with THE SAME password
            const emailHtml = `
                <div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #e4e6eb; border-radius: 12px;">
                    <div style="text-align: center; margin-bottom: 30px;">
                        <h1 style="color: #1877f2;">🏝️ ResortReviews</h1>
                        <h2>Welcome ${existingResort.name}!</h2>
                    </div>
                    
                    <div style="background: #f0f2f5; padding: 20px; border-radius: 12px; margin-bottom: 30px;">
                        <p style="margin: 0 0 15px 0; font-size: 16px;">Your resort has been verified. Here are your login credentials:</p>
                        
                        <div style="background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                            <p><strong>Resort:</strong> ${existingResort.name}</p>
                            <p><strong>Email:</strong> ${request.contact_email}</p>
                            <p><strong>Temporary Password:</strong> <code style="background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 16px;">${tempPassword}</code></p>
                        </div>
                        
                        <p style="color: #65676b; font-size: 14px;">⚠️ Please change your password immediately after logging in.</p>
                    </div>
                    
                    <div style="text-align: center;">
                        <a href="https://resort-reviews.vercel.app/resort-login.html" 
                           style="background: #1877f2; color: white; padding: 12px 24px; text-decoration: none; border-radius: 8px; display: inline-block;">
                            Login to Dashboard
                        </a>
                    </div>
                    
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #e4e6eb; color: #65676b; font-size: 12px; text-align: center;">
                        <p>This email was sent regarding your ResortReviews verification.</p>
                        <p>© 2026 ResortReviews. All rights reserved.</p>
                    </div>
                </div>
            `;
            
            // Send email
            try {
                await sendEmailViaAPI(
                    request.contact_email,
                    `🎉 Your ResortReviews Login Credentials - ${existingResort.name}`,
                    emailHtml
                );
                alert(`✅ ${existingResort.name} verified! Login credentials sent to ${request.contact_email}`);
            } catch (emailError) {
                console.error('Email failed but resort approved:', emailError);
                alert(`✅ Resort verified! But email failed to send.\n\nResort: ${existingResort.name}\nEmail: ${request.contact_email}\nPassword: ${tempPassword}\n\nUse these credentials to login.`);
            }
            
            await loadStats();
            await loadRequests(currentStatus);
            
        } catch (error) {
            console.error('❌ Error in approveRequest:', error);
            alert('Error approving request: ' + error.message);
        }
    }
    
    async function rejectRequest(requestId) {
        console.log('❌ Reject button clicked for request:', requestId);
        
        const reason = prompt('Please provide a reason for rejection (optional):');
        
        try {
            await supabaseClient
                .from('verification_requests')
                .update({ 
                    status: 'rejected',
                    admin_notes: reason,
                    reviewed_at: new Date()
                })
                .eq('id', requestId);
            
            alert('Request rejected.');
            await loadStats();
            await loadRequests(currentStatus);
        } catch (error) {
            console.error('Error rejecting request:', error);
            alert('Error rejecting request: ' + error.message);
        }
    }
</script>

</body>
</html>
