<!DOCTYPE html>
<html>
<head>
    <title>Verification Requests - ResortReviews</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        
        .admin-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            display: block;
        }
        
        .stat-label {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        
        .tab {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab:hover {
            background: var(--hover-bg);
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .request-card {
            background: var(--white);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .request-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .request-id {
            font-weight: bold;
            color: var(--primary);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-approved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-rejected {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .status-verifying {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .request-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .detail-item {
            background: var(--bg-color);
            padding: 12px;
            border-radius: 8px;
        }
        
        .detail-item strong {
            display: block;
            color: var(--text-light);
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .detail-item p {
            color: var(--text-dark);
            font-size: 14px;
        }
        
        .risk-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }
        
        .risk-low {
            background: #d1fae5;
            color: #065f46;
        }
        
        .risk-medium {
            background: #fef3c7;
            color: #92400e;
        }
        
        .risk-high {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .verification-section {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .verification-section h4 {
            margin-bottom: 15px;
            color: var(--text-dark);
        }
        
        .verification-checklist {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .verification-checklist label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-dark);
        }
        
        .verification-checklist input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        
        .verification-methods {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 15px 0;
        }
        
        .method-btn {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--white);
            cursor: pointer;
            font-size: 13px;
            color: var(--text-dark);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .method-btn:hover {
            background: var(--hover-bg);
            border-color: var(--primary);
        }
        
        .method-btn i {
            color: var(--primary);
        }
        
        .verification-log {
            background: var(--white);
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-light);
            max-height: 150px;
            overflow-y: auto;
        }
        
        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-time {
            color: var(--text-light);
            font-size: 10px;
            min-width: 60px;
        }
        
        .log-action {
            color: var(--text-dark);
        }
        
        .request-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-verify {
            background: #3b82f6;
            color: white;
        }
        
        .btn-approve {
            background: #10b981;
            color: white;
        }
        
        .btn-reject {
            background: #ef4444;
            color: white;
        }
        
        .btn-delete {
            background: #6b7280;
            color: white;
        }
        
        .no-requests {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
            font-style: italic;
        }
        
        .back-link {
            margin-bottom: 20px;
        }
        
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }

        .domain-warning {
            background: #fee2e2;
            border: 1px solid #ef4444;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            color: #991b1b;
            font-size: 13px;
        }

        .domain-success {
            background: #d1fae5;
            border: 1px solid #10b981;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            color: #065f46;
            font-size: 13px;
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <a href="admin.html" class="home-btn" title="Admin Dashboard">
            <i class="fas fa-shield-alt"></i>
        </a>
    </div>
    <div class="nav-center">
        <a href="admin.html" class="logo">
            <i class="fas fa-umbrella-beach"></i>
            <span>ResortReviews Admin</span>
        </a>
    </div>
    <div class="nav-right">
        <div class="nav-icons">
            <a href="index.html" class="icon-btn" title="Home">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </div>
</div>

<div class="admin-container">
    <div class="back-link">
        <a href="admin.html"><i class="fas fa-arrow-left"></i> Back to Admin Dashboard</a>
    </div>
    
    <div class="admin-header">
        <div>
            <h1><i class="fas fa-check-circle"></i> Verification Requests</h1>
            <p>Review and verify resort applications</p>
        </div>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <span class="stat-value" id="pendingCount">0</span>
            <span class="stat-label">Pending</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="verifyingCount">0</span>
            <span class="stat-label">Verifying</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="approvedCount">0</span>
            <span class="stat-label">Approved</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="rejectedCount">0</span>
            <span class="stat-label">Rejected</span>
        </div>
    </div>
    
    <div class="tab-nav">
        <button class="tab active" onclick="loadRequests('pending')" id="tabPending">Pending</button>
        <button class="tab" onclick="loadRequests('verifying')" id="tabVerifying">Verifying</button>
        <button class="tab" onclick="loadRequests('approved')" id="tabApproved">Approved</button>
        <button class="tab" onclick="loadRequests('rejected')" id="tabRejected">Rejected</button>
    </div>
    
    <div id="requestsList">
        <div class="loading-spinner">Loading requests...</div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://yaqtahzosvsrvbzurhgn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_syHNOYJ3kCbtLTwXI_wWiA_D-NYvwXl";
    
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentStatus = 'pending';
    let currentRequestId = null;
    
    // Free email domains (high risk)
    const FREE_EMAIL_DOMAINS = [
        'gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com',
        'aol.com', 'icloud.com', 'mail.com', 'protonmail.com',
        'yandex.com', 'gmx.com', 'live.com', 'msn.com'
    ];
    
    window.addEventListener('load', async function() {
        await loadStats();
        await loadRequests('pending');
    });
    
    async function loadStats() {
        const { data: requests } = await supabaseClient
            .from('verification_requests')
            .select('status');
        
        if (!requests) return;
        
        const pending = requests.filter(r => r.status === 'pending').length;
        const verifying = requests.filter(r => r.status === 'verifying').length;
        const approved = requests.filter(r => r.status === 'approved').length;
        const rejected = requests.filter(r => r.status === 'rejected').length;
        
        document.getElementById('pendingCount').textContent = pending;
        document.getElementById('verifyingCount').textContent = verifying;
        document.getElementById('approvedCount').textContent = approved;
        document.getElementById('rejectedCount').textContent = rejected;
    }
    
    async function loadRequests(status) {
        currentStatus = status;
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
        });
        document.getElementById(`tab${status.charAt(0).toUpperCase() + status.slice(1)}`).classList.add('active');
        
        const { data: requests } = await supabaseClient
            .from('verification_requests')
            .select('*')
            .eq('status', status)
            .order('created_at', { ascending: false });
        
        displayRequests(requests || []);
    }
    
    function analyzeRisk(request) {
        const emailDomain = request.contact_email.split('@')[1];
        let riskLevel = 'low';
        let reasons = [];
        
        // Check for free email domain
        if (FREE_EMAIL_DOMAINS.includes(emailDomain)) {
            riskLevel = 'high';
            reasons.push('Free email domain');
        }
        
        // Check for generic contact person
        const genericNames = ['test', 'admin', 'info', 'contact', 'resort', 'manager'];
        if (genericNames.some(name => request.contact_person.toLowerCase().includes(name))) {
            riskLevel = 'medium';
            reasons.push('Generic contact name');
        }
        
        // Check phone number format (simple check)
        if (request.phone && request.phone.length < 7) {
            riskLevel = 'medium';
            reasons.push('Suspicious phone number');
        }
        
        return { level: riskLevel, reasons };
    }
    
    function displayRequests(requests) {
        const container = document.getElementById('requestsList');
        
        if (requests.length === 0) {
            container.innerHTML = '<div class="no-requests">No verification requests found</div>';
            return;
        }
        
        let html = '';
        
        requests.forEach(request => {
            const date = new Date(request.created_at).toLocaleDateString();
            const risk = analyzeRisk(request);
            
            html += `
                <div class="request-card" id="request-${request.id}">
                    <div class="request-header">
                        <div>
                            <span class="request-id">Request #${request.id}</span>
                            <span class="status-badge status-${request.status}">${request.status.toUpperCase()}</span>
                            <span class="risk-indicator risk-${risk.level}">${risk.level.toUpperCase()} RISK</span>
                        </div>
                        <span>${date}</span>
                    </div>
                    
                    <div class="request-details">
                        <div class="detail-item">
                            <strong>Resort Name</strong>
                            <p>${request.resort_name}</p>
                        </div>
                        <div class="detail-item">
                            <strong>Contact Person</strong>
                            <p>${request.contact_person}</p>
                        </div>
                        <div class="detail-item">
                            <strong>Email</strong>
                            <p>${request.contact_email}</p>
                        </div>
                        <div class="detail-item">
                            <strong>Phone</strong>
                            <p>${request.phone || 'Not provided'}</p>
                        </div>
                        ${request.message ? `
                        <div class="detail-item" style="grid-column: span 2;">
                            <strong>Message</strong>
                            <p>${request.message}</p>
                        </div>
                        ` : ''}
                    </div>
                    
                    ${request.status === 'pending' ? `
                        <div class="domain-check" id="domain-check-${request.id}">
                            ${checkEmailDomain(request.contact_email)}
                        </div>
                        
                        <div class="verification-section">
                            <h4>🔍 Verification Checklist</h4>
                            <div class="verification-checklist" id="checklist-${request.id}">
                                <label>
                                    <input type="checkbox" class="verify-check" data-id="${request.id}" data-item="domain">
                                    Email domain matches resort website
                                </label>
                                <label>
                                    <input type="checkbox" class="verify-check" data-id="${request.id}" data-item="phone">
                                    Called and confirmed (${request.phone || 'No phone'})
                                </label>
                                <label>
                                    <input type="checkbox" class="verify-check" data-id="${request.id}" data-item="exists">
                                    Resort exists in database
                                </label>
                                <label>
                                    <input type="checkbox" class="verify-check" data-id="${request.id}" data-item="linkedin">
                                    Contact person verified (LinkedIn/Google)
                                </label>
                            </div>
                            
                            <div class="verification-methods">
                                <button class="method-btn" onclick="verifyByEmail(${request.id})">
                                    <i class="fas fa-envelope"></i> Send Code
                                </button>
                                <button class="method-btn" onclick="verifyByPhone(${request.id})">
                                    <i class="fas fa-phone"></i> Call Resort
                                </button>
                                <button class="method-btn" onclick="verifyWebsite(${request.id})">
                                    <i class="fas fa-globe"></i> Check Website
                                </button>
                            </div>
                            
                            <div class="verification-log" id="log-${request.id}">
                                <div class="log-entry">
                                    <span class="log-time">${new Date().toLocaleTimeString()}</span>
                                    <span class="log-action">⚠️ Risk level: ${risk.level}</span>
                                </div>
                                ${risk.reasons.map(reason => `
                                    <div class="log-entry">
                                        <span class="log-time">-</span>
                                        <span class="log-action">⚠️ ${reason}</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        
                        <div class="request-actions">
                            <button class="action-btn btn-verify" onclick="startVerification(${request.id})">
                                <i class="fas fa-clipboard-check"></i> Start Verification
                            </button>
                            <button class="action-btn btn-reject" onclick="rejectRequest(${request.id})">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        </div>
                    ` : ''}
                    
                    ${request.status === 'verifying' ? `
                        <div class="request-actions">
                            <button class="action-btn btn-approve" onclick="approveRequest(${request.id})">
                                <i class="fas fa-check"></i> Approve
                            </button>
                            <button class="action-btn btn-reject" onclick="rejectRequest(${request.id})">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        </div>
                    ` : ''}
                </div>
            `;
        });
        
        container.innerHTML = html;
    }
    
    function checkEmailDomain(email) {
        const domain = email.split('@')[1];
        if (FREE_EMAIL_DOMAINS.includes(domain)) {
            return `<div class="domain-warning">
                <i class="fas fa-exclamation-triangle"></i> 
                Warning: Free email domain (${domain}). Real resorts usually use their own domain.
            </div>`;
        } else {
            return `<div class="domain-success">
                <i class="fas fa-check-circle"></i> 
                Professional email domain: ${domain}
            </div>`;
        }
    }
    
    async function startVerification(requestId) {
        currentRequestId = requestId;
        
        // Update status to 'verifying'
        await supabaseClient
            .from('verification_requests')
            .update({ status: 'verifying' })
            .eq('id', requestId);
        
        // Log the action
        await logVerificationAction(requestId, 'Verification started');
        
        alert('✅ Verification process started. Use the methods below to verify.');
        await loadRequests('verifying');
    }
    
    async function verifyByEmail(requestId) {
        const { data: request } = await supabaseClient
            .from('verification_requests')
            .select('*')
            .eq('id', requestId)
            .single();
        
        const verificationCode = Math.floor(100000 + Math.random() * 900000);
        
        // Store code in verification_logs or create a codes table
        await logVerificationAction(requestId, `Verification code ${verificationCode} generated`);
        
        // In production, integrate with email service
        console.log(`Demo: Verification code ${verificationCode} sent to ${request.contact_email}`);
        
        const enteredCode = prompt(`Verification code sent to ${request.contact_email}\nEnter the 6-digit code:`, '');
        
        if (enteredCode == verificationCode) {
            await logVerificationAction(requestId, '✅ Email verified successfully');
            alert('✅ Email verified!');
            updateChecklistItem(requestId, 'domain', true);
        } else {
            alert('❌ Invalid code. Try again.');
        }
    }
    
    async function verifyByPhone(requestId) {
        const { data: request } = await supabaseClient
            .from('verification_requests')
            .select('*')
            .eq('id', requestId)
            .single();
        
        alert(`📞 Call ${request.phone || 'the number provided'} and confirm they requested verification.`);
        
        const confirmed = confirm('Did they confirm they are the official resort representative?');
        
        if (confirmed) {
            await logVerificationAction(requestId, '✅ Phone verification confirmed');
            alert('✅ Phone verified!');
            updateChecklistItem(requestId, 'phone', true);
        } else {
            alert('Verification cancelled.');
        }
    }
    
    async function verifyWebsite(requestId) {
        const { data: request } = await supabaseClient
            .from('verification_requests')
            .select('*')
            .eq('id', requestId)
            .single();
        
        const website = prompt('Enter the resort\'s official website:', 'https://');
        
        if (!website) return;
        
        try {
            const websiteDomain = new URL(website).hostname.replace('www.', '');
            const emailDomain = request.contact_email.split('@')[1];
            
            if (emailDomain === websiteDomain) {
                await logVerificationAction(requestId, `✅ Website domain matches email: ${websiteDomain}`);
                alert('✅ Domain verified! Email matches resort website.');
                updateChecklistItem(requestId, 'domain', true);
            } else {
                await logVerificationAction(requestId, `⚠️ Domain mismatch: Email(${emailDomain}) vs Website(${websiteDomain})`);
                alert(`⚠️ Warning: Email domain (${emailDomain}) doesn't match website (${websiteDomain})`);
            }
        } catch (e) {
            alert('Invalid URL format');
        }
    }
    
    function updateChecklistItem(requestId, item, checked) {
        const checkboxes = document.querySelectorAll(`#checklist-${requestId} input[data-item="${item}"]`);
        checkboxes.forEach(cb => cb.checked = checked);
    }
    
    async function logVerificationAction(requestId, action) {
        const logDiv = document.getElementById(`log-${requestId}`);
        if (logDiv) {
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `
                <div class="log-entry">
                    <span class="log-time">${time}</span>
                    <span class="log-action">${action}</span>
                </div>
            `;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        // In production, save to database
        console.log(`[Request ${requestId}] ${action}`);
    }
    
    async function approveRequest(requestId) {
        const { data: request } = await supabaseClient
            .from('verification_requests')
            .select('*')
            .eq('id', requestId)
            .single();
        
        // Generate temporary password
        const tempPassword = Math.random().toString(36).slice(-8) + Math.random().toString(36).slice(-8).toUpperCase();
        
        // Check if resort already exists
        const { data: existingResort } = await supabaseClient
            .from('resorts')
            .select('id')
            .eq('name', request.resort_name)
            .single();
        
        if (existingResort) {
            await supabaseClient
                .from('resorts')
                .update({
                    verified: true,
                    login_email: request.contact_email,
                    temp_password: tempPassword,
                    phone: request.phone
                })
                .eq('id', existingResort.id);
        } else {
            await supabaseClient
                .from('resorts')
                .insert([{
                    name: request.resort_name,
                    verified: true,
                    login_email: request.contact_email,
                    temp_password: tempPassword,
                    phone: request.phone,
                    address: '',
                    hours: 'Open 24 hours',
                    website: ''
                }]);
        }
        
        await supabaseClient
            .from('verification_requests')
            .update({ 
                status: 'approved',
                reviewed_at: new Date()
            })
            .eq('id', requestId);
        
        await logVerificationAction(requestId, '✅ Request approved');
        
        // Show credentials
        alert(`✅ Resort approved!\n\nTemporary password: ${tempPassword}\nLogin: ${request.contact_email}\n\nIn production, this would be emailed.`);
        
        await loadStats();
        await loadRequests(currentStatus);
    }
    
    async function rejectRequest(requestId) {
        const reason = prompt('Please provide a reason for rejection (optional):');
        
        await supabaseClient
            .from('verification_requests')
            .update({ 
                status: 'rejected',
                admin_notes: reason,
                reviewed_at: new Date()
            })
            .eq('id', requestId);
        
        await logVerificationAction(requestId, `❌ Request rejected${reason ? ': ' + reason : ''}`);
        alert('Request rejected.');
        
        await loadStats();
        await loadRequests(currentStatus);
    }

async function sendEmailViaResend(to, subject, html) {
    console.log('📧 Attempting to send email via proxy...');
    console.log('To:', to);
    
    try {
        const response = await fetch('/api/send-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                to: to,
                subject: subject,
                html: html
            })
        });
        
        const data = await response.json();
        console.log('✅ Proxy Response:', data);
        
        if (!response.ok) {
            throw new Error(data.error || 'Failed to send email');
        }
        
        return data;
    } catch (error) {
        console.error('❌ Error sending email:', error);
        throw error;
    }
}
