<!DOCTYPE html>
<html>
<head>
    <title>Resort Reviews Maldives</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Top Navigation Bar -->
<div class="top-nav">
    <div class="nav-left">
        <a href="guest-feed.html" class="home-btn" title="Home">
            <i class="fas fa-home"></i>
        </a>
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search resorts...">
        </div>
    </div>
    
    <div class="nav-center">
        <a href="guest-feed.html" class="logo">
            <i class="fas fa-umbrella-beach"></i>
            <span>ResortReviews</span>
        </a>
    </div>
    
    <div class="nav-right">
        <div class="nav-icons">
            <a href="resort-login.html" class="icon-btn" title="Resort Login">
                <i class="fas fa-building"></i>
            </a>
            <button class="icon-btn" onclick="openSettings()" title="Settings">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </div>
</div>

<!-- Main Layout -->
<div class="main-layout">
    <!-- LEFT SIDEBAR -->
    <div class="left-sidebar"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
        
        <!-- Top Resorts Bar -->
        <div class="top-resorts-bar">
            <h3><i class="fas fa-trophy"></i> Top Rated Resorts</h3>
            <div class="resort-rankings" id="topResorts">
                <!-- Populated by JavaScript -->
            </div>
        </div>

        <!-- Share Box -->
        <div class="share-box" onclick="openModal()">
            <div class="share-input">
                <i class="fas fa-pen"></i>
                <span>Share your experience...</span>
            </div>
            <div class="share-actions">
                <div class="share-action">
                    <i class="fas fa-camera" style="color: #4caf50;"></i>
                    <span>Photo</span>
                </div>
            </div>
        </div>

        <!-- Feed Header -->
        <div class="feed-header">
            <h3><i class="fas fa-newspaper"></i> Recent Reviews</h3>
            <span id="review-count">0 reviews</span>
        </div>
        
        <!-- Reviews Feed -->
        <div class="feed" id="reviews-list">
            <div class="loading-spinner">Loading reviews...</div>
        </div>
    </div>

    <!-- RIGHT SIDEBAR -->
    <div class="right-sidebar">
        <div class="sidebar-header">
            <h3><i class="fas fa-list"></i> All Resorts A-Z</h3>
        </div>
        <div class="resort-list" id="resortRankings">
            <div class="loading-spinner">Loading...</div>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal" onclick="closeSettingsModal()">
    <div class="modal-content settings-modal" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3><i class="fas fa-cog"></i> Settings</h3>
            <i class="fas fa-times modal-close" onclick="closeSettingsModal()"></i>
        </div>
        
        <div class="settings-content">
            <!-- Dark Mode Toggle -->
            <div class="settings-section">
                <h4>Appearance</h4>
                <div class="settings-item">
                    <div class="settings-info">
                        <i class="fas fa-moon"></i>
                        <span>Dark Mode</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <!-- Navigation -->
            <div class="settings-section">
                <h4>Navigation</h4>
                <div class="settings-item">
                    <div class="settings-info">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Back to Login Page</span>
                    </div>
                    <a href="index.html" class="settings-btn">
                        <i class="fas fa-arrow-right"></i>
                    </a>
                </div>
            </div>

            <!-- About Section -->
            <div class="settings-section">
                <h4>About</h4>
                <div class="settings-item">
                    <div class="settings-info">
                        <i class="fas fa-info-circle"></i>
                        <span>Version 1.0.0</span>
                    </div>
                </div>
                <div class="settings-item">
                    <div class="settings-info">
                        <i class="fas fa-shield-alt"></i>
                        <span>Anonymous & Verified</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Share Post Modal -->
<div class="modal-overlay" id="shareModal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <h3><i class="fas fa-pen-fancy"></i> Create Post</h3>
            <i class="fas fa-times modal-close" onclick="closeModal()"></i>
        </div>
        
        <form id="modalReviewForm">
            <div class="searchable-dropdown">
                <input type="text" id="resort_search" placeholder="Search for a resort..." autocomplete="off" required>
                <input type="hidden" id="modal_resort_id" required>
                <div id="resort_suggestions" class="suggestions-box"></div>
            </div>

            <div class="rating-selector">
                <label>Rating: <span id="modalRatingValue">5</span>/10</label>
                <input type="range" id="modal_rating" min="1" max="10" value="5">
            </div>

            <textarea id="modal_review_text" placeholder="Describe staff accommodation, food, facilities..." required></textarea>

            <div class="photo-upload">
                <label for="modal_photos" class="photo-label">
                    <i class="fas fa-camera"></i> Add Photos (max 3)
                </label>
                <input type="file" id="modal_photos" accept="image/*" multiple style="display: none;">
                <div class="photo-preview" id="modalPhotoPreview"></div>
            </div>

            <button type="submit" class="post-btn">
                <i class="fas fa-paper-plane"></i> Post Review
            </button>
        </form>
        <div id="modalMessage" class="message"></div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script>
    // ===========================================
    // DARK MODE FUNCTIONS
    // ===========================================
    
    // Check for saved theme preference
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        console.log('Saved theme:', savedTheme);
        
        if (savedTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            const toggle = document.getElementById('darkModeToggle');
            if (toggle) toggle.checked = true;
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            const toggle = document.getElementById('darkModeToggle');
            if (toggle) toggle.checked = false;
        }
    }

    // Toggle dark mode
    function toggleDarkMode() {
        const toggle = document.getElementById('darkModeToggle');
        if (toggle.checked) {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            console.log('Dark mode enabled');
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light');
            console.log('Light mode enabled');
        }
    }

    // Settings modal functions
    function openSettings() {
        document.getElementById('settingsModal').classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // Update toggle state based on current theme
        const toggle = document.getElementById('darkModeToggle');
        if (toggle) {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            toggle.checked = currentTheme === 'dark';
        }
    }

    function closeSettingsModal() {
        document.getElementById('settingsModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    // Share modal functions
    function openModal() {
        document.getElementById('shareModal').classList.add('active');
        document.body.style.overflow = 'hidden';
        
        // Clear form
        document.getElementById('resort_search').value = '';
        document.getElementById('modal_resort_id').value = '';
        document.getElementById('modal_review_text').value = '';
        document.getElementById('modalPhotoPreview').innerHTML = '';
        document.getElementById('modalRatingValue').textContent = '5';
        document.getElementById('modal_rating').value = '5';
    }

    function closeModal() {
        document.getElementById('shareModal').classList.remove('active');
        document.body.style.overflow = '';
    }

    // Initialize theme when page loads
    document.addEventListener('DOMContentLoaded', function() {
        initTheme();
        
        // Close modals with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeSettingsModal();
                closeModal();
            }
        });
    });
</script>
</body>
</html>
