<!DOCTYPE html>
<html>
<head>
    <title>Admin Reports - ResortReviews</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        
        .admin-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--white);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            display: block;
        }
        
        .stat-label {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        
        .tab {
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .tab:hover {
            background: var(--hover-bg);
        }
        
        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .reports-section {
            background: var(--white);
            border-radius: 16px;
            padding: 20px;
            box-shadow: var(--shadow);
        }
        
        .report-card {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .report-id {
            font-weight: bold;
            color: var(--primary);
        }
        
        .report-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .status-reviewed {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .status-resolved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-dismissed {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .report-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .detail-item {
            background: var(--white);
            padding: 12px;
            border-radius: 8px;
        }
        
        .detail-item strong {
            display: block;
            color: var(--text-light);
            font-size: 12px;
            margin-bottom: 4px;
        }
        
        .detail-item p {
            color: var(--text-dark);
            font-size: 14px;
        }
        
        .report-review {
            background: var(--white);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .report-review h4 {
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        
        .report-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }
        
        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-reviewed {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .btn-resolved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .btn-dismissed {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .btn-delete {
            background: #ef4444;
            color: white;
        }
        
        .no-reports {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
            font-style: italic;
        }
        
        .back-link {
            margin-bottom: 20px;
        }
        
        .back-link a {
            color: var(--primary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .loading-spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-light);
        }
    </style>
</head>
<body>

<!-- Top Navigation -->
<div class="top-nav">
    <div class="nav-left">
        <a href="admin.html" class="home-btn" title="Admin Dashboard">
            <i class="fas fa-shield-alt"></i>
        </a>
    </div>
    <div class="nav-center">
        <a href="admin.html" class="logo">
            <i class="fas fa-umbrella-beach"></i>
            <span>ResortReviews Admin</span>
        </a>
    </div>
    <div class="nav-right">
        <div class="nav-icons">
            <button class="icon-btn" onclick="logout()" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
            <a href="index.html" class="icon-btn" title="Home">
                <i class="fas fa-home"></i>
            </a>
        </div>
    </div>
</div>

<div class="admin-container">
    <div class="back-link">
        <a href="admin.html"><i class="fas fa-arrow-left"></i> Back to Admin Dashboard</a>
    </div>
    
    <div class="admin-header">
        <div>
            <h1><i class="fas fa-flag"></i> Reports Management</h1>
            <p>Review and manage resort reports</p>
        </div>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <span class="stat-value" id="pendingCount">0</span>
            <span class="stat-label">Pending</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="reviewedCount">0</span>
            <span class="stat-label">Reviewed</span>
        </div>
        <div class="stat-card">
            <span class="stat-value" id="resolvedCount">0</span>
            <span class="stat-label">Resolved</span>
        </div>
    </div>
    
    <div class="tab-nav">
        <button class="tab active" onclick="loadReports('pending')" id="tabPending">Pending</button>
        <button class="tab" onclick="loadReports('reviewed')" id="tabReviewed">Reviewed</button>
        <button class="tab" onclick="loadReports('resolved')" id="tabResolved">Resolved</button>
        <button class="tab" onclick="loadReports('dismissed')" id="tabDismissed">Dismissed</button>
    </div>
    
    <div class="reports-section">
        <div id="reportsList">
            <div class="loading-spinner">Loading reports...</div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    // ===========================================
    // SECURITY CHECK - MUST BE LOGGED IN
    // ===========================================
    (function() {
        const isLoggedIn = localStorage.getItem('admin_logged_in') === 'true';
        const loginTimestamp = localStorage.getItem('admin_login_timestamp');
        
        console.log('Security check - Logged in:', isLoggedIn);
        
        if (!isLoggedIn) {
            console.log('Not logged in, redirecting to admin.html');
            window.location.href = 'admin.html';
            return;
        }
        
        // Check session expiry (4 hours)
        if (loginTimestamp) {
            const elapsedTime = new Date().getTime() - parseInt(loginTimestamp);
            const fourHoursInMs = 4 * 60 * 60 * 1000;
            
            if (elapsedTime > fourHoursInMs) {
                console.log('Session expired, logging out');
                localStorage.removeItem('admin_logged_in');
                localStorage.removeItem('admin_login_timestamp');
                window.location.href = 'admin.html';
                return;
            }
        }
    })();

    const SUPABASE_URL = "https://yaqtahzosvsrvbzurhgn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_syHNOYJ3kCbtLTwXI_wWiA_D-NYvwXl";
    
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentStatus = 'pending';
    
    window.addEventListener('load', async function() {
        await loadStats();
        await loadReports('pending');
    });
    
    function logout() {
        localStorage.removeItem('admin_logged_in');
        localStorage.removeItem('admin_login_timestamp');
        window.location.href = 'admin.html';
    }
    
    async function loadStats() {
        try {
            const { data: reports } = await supabaseClient
                .from('reports')
                .select('status');
            
            if (!reports) return;
            
            const pending = reports.filter(r => r.status === 'pending').length;
            const reviewed = reports.filter(r => r.status === 'reviewed').length;
            const resolved = reports.filter(r => r.status === 'resolved').length;
            
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('reviewedCount').textContent = reviewed;
            document.getElementById('resolvedCount').textContent = resolved;
        } catch (error) {
            console.error('Error loading stats:', error);
        }
    }
    
    async function loadReports(status) {
        currentStatus = status;
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.classList.remove('active');
        });
        document.getElementById(`tab${status.charAt(0).toUpperCase() + status.slice(1)}`).classList.add('active');
        
        try {
            const { data: reports } = await supabaseClient
                .from('reports')
                .select(`
                    *,
                    reviews (
                        id,
                        rating,
                        review_text,
                        photo_urls,
                        created_at
                    ),
                    resorts (
                        id,
                        name
                    )
                `)
                .eq('status', status)
                .order('created_at', { ascending: false });
            
            displayReports(reports || []);
        } catch (error) {
            console.error('Error loading reports:', error);
            document.getElementById('reportsList').innerHTML = '<div class="no-reports">Error loading reports</div>';
        }
    }
    
    function displayReports(reports) {
        const container = document.getElementById('reportsList');
        
        if (reports.length === 0) {
            container.innerHTML = '<div class="no-reports">No reports found</div>';
            return;
        }
        
        let html = '';
        
        reports.forEach(report => {
            const date = new Date(report.created_at).toLocaleDateString();
            
            html += `
                <div class="report-card">
                    <div class="report-header">
                        <div>
                            <span class="report-id">Report #${report.id}</span>
                            <span class="report-status status-${report.status}">${report.status.toUpperCase()}</span>
                        </div>
                        <span>${date}</span>
                    </div>
                    
                    <div class="report-details">
                        <div class="detail-item">
                            <strong>Resort</strong>
                            <p>${report.resorts?.name || 'Unknown'}</p>
                        </div>
                        <div class="detail-item">
                            <strong>Reason</strong>
                            <p>${report.reason}</p>
                        </div>
                        ${report.description ? `
                        <div class="detail-item" style="grid-column: span 2;">
                            <strong>Description</strong>
                            <p>${report.description}</p>
                        </div>
                        ` : ''}
                    </div>
                    
                    <div class="report-review">
                        <h4>Reported Review</h4>
                        <p><strong>Rating:</strong> ${report.reviews?.rating}/10</p>
                        <p><strong>Review:</strong> ${report.reviews?.review_text}</p>
                        <p><strong>Date:</strong> ${new Date(report.reviews?.created_at).toLocaleDateString()}</p>
                        ${report.reviews?.photo_urls && report.reviews.photo_urls !== '[]' ? 
                            '<p><i class="fas fa-image"></i> Contains photos</p>' : ''}
                    </div>
                    
                    <div class="report-actions">
                        <button class="action-btn btn-reviewed" onclick="updateStatus(${report.id}, 'reviewed')">
                            <i class="fas fa-eye"></i> Mark Reviewed
                        </button>
                        <button class="action-btn btn-resolved" onclick="updateStatus(${report.id}, 'resolved')">
                            <i class="fas fa-check"></i> Mark Resolved
                        </button>
                        <button class="action-btn btn-dismissed" onclick="updateStatus(${report.id}, 'dismissed')">
                            <i class="fas fa-times"></i> Dismiss
                        </button>
                        <button class="action-btn btn-delete" onclick="deleteReport(${report.id})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `;
        });
        
        container.innerHTML = html;
    }
    
    async function updateStatus(reportId, status) {
        try {
            const { error } = await supabaseClient
                .from('reports')
                .update({ 
                    status: status,
                    resolved_at: new Date()
                })
                .eq('id', reportId);
            
            if (error) throw error;
            
            await loadStats();
            await loadReports(currentStatus);
        } catch (error) {
            alert('Error updating report: ' + error.message);
        }
    }
    
    async function deleteReport(reportId) {
        if (!confirm('Are you sure you want to delete this report?')) return;
        
        try {
            const { error } = await supabaseClient
                .from('reports')
                .delete()
                .eq('id', reportId);
            
            if (error) throw error;
            
            await loadStats();
            await loadReports(currentStatus);
        } catch (error) {
            alert('Error deleting report: ' + error.message);
        }
    }
</script>

</body>
</html>
