<!DOCTYPE html>
<html>
<head>
    <title>Resort Dashboard - ResortReviews</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container {
            max-width: 1200px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }
        
        .dashboard-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .resort-badge {
            background: gold;
            color: black;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: bold;
            color: var(--primary);
            display: block;
        }
        
        .stat-label {
            color: var(--text-light);
            font-size: 14px;
        }
        
        .reviews-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .review-item {
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
        }
        
        .review-item:last-child {
            border-bottom: none;
        }
        
        .review-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .review-rating {
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }
        
        .review-date {
            color: var(--text-light);
            font-size: 12px;
        }
        
        .comment-section {
            margin-top: 15px;
            padding-left: 20px;
            border-left: 3px solid var(--primary);
        }
        
        .comment-box {
            background: var(--bg-color);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .comment-box textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            resize: vertical;
        }
        
        .btn-comment {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }
        
        .btn-comment:hover {
            background: var(--primary-hover);
        }
        
        .existing-comment {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 3px solid gold;
        }
        
        .official-badge {
            background: gold;
            color: black;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 8px;
        }
        
        .logout-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-left">
        <a href="index.html" class="home-btn" title="Home">
            <i class="fas fa-home"></i>
        </a>
    </div>
    <div class="nav-center">
        <a href="index.html" class="logo">
            <i class="fas fa-umbrella-beach"></i>
            <span>ResortReviews</span>
        </a>
    </div>
    <div class="nav-right">
        <div class="nav-icons">
            <button class="icon-btn" onclick="logout()" title="Logout">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>
</div>

<div class="dashboard-container" id="dashboard">
    <div class="loading-spinner">Loading dashboard...</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = "https://yaqtahzosvsrvbzurhgn.supabase.co";
    const SUPABASE_KEY = "sb_publishable_syHNOYJ3kCbtLTwXI_wWiA_D-NYvwXl";
    
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const resortId = localStorage.getItem('resort_id');
    const resortName = localStorage.getItem('resort_name');
    
    if (!resortId) {
        window.location.href = 'resort-login.html';
    }
    
    window.addEventListener('load', async function() {
        await loadDashboard();
        await loadReviews();
    });
    
    async function loadDashboard() {
        const { data: resort } = await supabaseClient
            .from('resorts')
            .select('*')
            .eq('id', resortId)
            .single();
        
        // Get stats
        const { data: reviews } = await supabaseClient
            .from('reviews')
            .select('*')
            .eq('resort_id', resortId)
            .eq('status', 'approved');
        
        const { data: comments } = await supabaseClient
            .from('resort_comments')
            .select('*')
            .eq('resort_id', resortId);
        
        const avgRating = reviews.length > 0 
            ? (reviews.reduce((sum, r) => sum + r.rating, 0) / reviews.length).toFixed(1)
            : '0.0';
        
        document.getElementById('dashboard').innerHTML = `
            <div class="dashboard-header">
                <div>
                    <h1>${resort.name} <span class="resort-badge">✓ VERIFIED</span></h1>
                    <p>Manage your resort's responses to staff reviews</p>
                </div>
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value">${avgRating}</span>
                    <span class="stat-label">Average Rating</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">${reviews.length}</span>
                    <span class="stat-label">Total Reviews</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">${comments.length}</span>
                    <span class="stat-label">Your Responses</span>
                </div>
            </div>
            
            <div class="reviews-section">
                <h2 style="margin-bottom: 20px;">📝 Staff Reviews</h2>
                <div id="reviewsList"></div>
            </div>
        `;
    }
    
    async function loadReviews() {
        const { data: reviews } = await supabaseClient
            .from('reviews')
            .select('*')
            .eq('resort_id', resortId)
            .eq('status', 'approved')
            .order('created_at', { ascending: false });
        
        const { data: comments } = await supabaseClient
            .from('resort_comments')
            .select('*')
            .eq('resort_id', resortId);
        
        const commentMap = {};
        comments.forEach(c => commentMap[c.review_id] = c);
        
        const reviewsList = document.getElementById('reviewsList');
        
        if (!reviews || reviews.length === 0) {
            reviewsList.innerHTML = '<p>No reviews yet for your resort.</p>';
            return;
        }
        
        let html = '';
        reviews.forEach(review => {
            const date = new Date(review.created_at).toLocaleDateString();
            const existingComment = commentMap[review.id];
            
            html += `
                <div class="review-item" id="review-${review.id}">
                    <div class="review-meta">
                        <span class="review-rating">${review.rating}/10</span>
                        <span class="review-date">${date}</span>
                    </div>
                    <p>${review.review_text}</p>
                    
                    <div class="comment-section">
                        ${existingComment ? `
                            <div class="existing-comment">
                                <strong>Your Response <span class="official-badge">OFFICIAL</span></strong>
                                <p style="margin-top: 8px;">${existingComment.comment_text}</p>
                                <small>${new Date(existingComment.created_at).toLocaleDateString()}</small>
                            </div>
                        ` : `
                            <div class="comment-box" id="comment-box-${review.id}">
                                <textarea id="comment-${review.id}" placeholder="Write a professional response to this review..." rows="3"></textarea>
                                <button class="btn-comment" onclick="submitComment(${review.id})">
                                    Post Response
                                </button>
                            </div>
                        `}
                    </div>
                </div>
            `;
        });
        
        reviewsList.innerHTML = html;
    }
    
    window.submitComment = async function(reviewId) {
        const comment = document.getElementById(`comment-${reviewId}`).value.trim();
        
        if (!comment) {
            alert('Please write a response');
            return;
        }
        
        const { error } = await supabaseClient
            .from('resort_comments')
            .insert([{
                review_id: reviewId,
                resort_id: parseInt(resortId),
                comment_text: comment,
                is_official: true
            }]);
        
        if (error) {
            alert('Error posting response: ' + error.message);
        } else {
            alert('✅ Response posted!');
            await loadReviews(); // Reload to show the response
        }
    };
    
    function logout() {
        localStorage.removeItem('resort_id');
        localStorage.removeItem('resort_name');
        window.location.href = 'resort-login.html';
    }
</script>

</body>
</html>
